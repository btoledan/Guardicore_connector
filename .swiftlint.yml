# Helmsman SwiftLint Configuration
disabled_rules:
  - trailing_whitespace       # handled by editor
  - line_length               # long lines acceptable in complex SSH/Kube logic
  - function_body_length      # parsers are inherently long

opt_in_rules:
  - empty_count
  - explicit_init
  - closure_spacing
  - first_where
  - force_unwrapping
  - implicitly_unwrapped_optional
  - redundant_nil_coalescing
  - sorted_imports
  - static_operator
  - unneeded_parentheses_in_closure_argument

# Thresholds
file_length:
  warning: 600
  error: 1000

function_parameter_count:
  warning: 8
  error: 12

type_body_length:
  warning: 400
  error: 600

# Paths
included:
  - Sources
  - Tests

excluded:
  - .build
  - DerivedData

# Custom rules
custom_rules:
  no_direct_process_launch:
    name: "Avoid direct Process() without PTY"
    message: "Use SSHKit or TerminalKit helpers instead of bare Process()."
    regex: 'Process\(\)'
    included: "Sources/Helmsman/.*\\.swift"
    severity: warning
