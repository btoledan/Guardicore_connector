name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  SCHEME: Helmsman
  DERIVED_DATA: .build/DerivedData

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint
        run: swiftlint lint --config .swiftlint.yml --reporter github-actions-logging

  # ── Build & Test ─────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test (${{ matrix.arch }})
    runs-on: macos-15
    strategy:
      matrix:
        arch: [arm64, x86_64]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve SPM packages
        run: xcodebuild -resolvePackageDependencies -scheme $SCHEME -derivedDataPath $DERIVED_DATA

      - name: Build (${{ matrix.arch }})
        run: |
          xcodebuild build \
            -scheme $SCHEME \
            -configuration Debug \
            -derivedDataPath $DERIVED_DATA \
            -destination "platform=macOS,arch=${{ matrix.arch }}" \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Test (${{ matrix.arch }})
        run: |
          xcodebuild test \
            -scheme $SCHEME \
            -configuration Debug \
            -derivedDataPath $DERIVED_DATA \
            -destination "platform=macOS,arch=${{ matrix.arch }}" \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty -r junit --output .build/test-results-${{ matrix.arch }}.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.arch }}
          path: .build/test-results-*.xml

  # ── Archive (Release only) ───────────────────────────────────────────────────
  archive:
    name: Archive (Release)
    runs-on: macos-15
    if: github.ref == 'refs/heads/main'
    needs: [lint, build-and-test]
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Archive
        run: |
          xcodebuild archive \
            -scheme $SCHEME \
            -configuration Release \
            -derivedDataPath $DERIVED_DATA \
            -archivePath .build/Helmsman.xcarchive \
            -destination "generic/platform=macOS" \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: Helmsman-archive
          path: .build/Helmsman.xcarchive
          retention-days: 30
